<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Development Portfolio | Vikash Saravanan</title>
    <meta name="description" content="Development Portfolio of Vikash Saravanan, showcasing technical skills, GitHub repositories, and AI/Data Science projects.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="animations.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Portfolio Core Consistency */
        body {
            background-color: #0a0a0f;
            color: #fff;
            overflow-x: hidden;
        }

        /* Sequential Repository Layout */
        .projects-sequential {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-top: 60px;
            max-width: 1000px;
            margin-inline: auto;
        }

        .repo-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        .repo-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
            z-index: -1;
        }

        .repo-panel:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(14, 165, 233, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 40px rgba(14, 165, 233, 0.1);
            background: rgba(255, 255, 255, 0.04);
        }

        .repo-panel:hover::before {
            left: 150%;
            transition: 0.7s;
        }

        .repo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
        }

        .repo-title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .repo-number {
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            color: rgba(14, 165, 233, 0.5);
            font-weight: 600;
        }

        .repo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(99, 102, 241, 0.2));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #0ea5e9;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
        }

        .repo-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .repo-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .repo-links a:hover {
            background: #0ea5e9;
            color: #fff;
            transform: rotate(360deg) scale(1.1);
            box-shadow: 0 0 15px #0ea5e9;
        }

        .repo-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .repo-desc {
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
        }

        .tech-stack-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .tech-pill {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            padding: 8px 16px;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 30px;
            color: #38bdf8;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Filter Styles Update */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .filter-tab.active, .filter-tab:hover {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 50px auto;
            position: relative;
        }

        .cert-search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: #fff;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .cert-search-input:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
            background: rgba(255,255,255,0.08);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 1.2rem;
        }

        @keyframes staggerIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stagger-in {
            opacity: 0;
            animation: staggerIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @media (max-width: 768px) {
            .repo-panel { padding: 25px; }
            .repo-title { font-size: 1.4rem; }
            .repo-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .repo-links { align-self: flex-end; margin-top: -50px; }
        }
    </style>
</head>

<body>
    <div id="app-frame">

        <!-- Navigation -->
        <nav class="navbar">

        <!-- Development Portfolio Section -->

            <div class="container">

                    <h2 class="mb-4" style="font-size: 3.5rem;">Development <span class="highlight">Portfolio</span></h2>
                    <p style="color: var(--text-secondary); max-width: 700px; margin: 0 auto; font-size: 1.2rem; line-height: 1.6;">A chronological deep-dive into my 16+ GitHub repositories. Architecting robust solutions across Artificial Intelligence, Full-Stack Engineering, and Data Science.</p>
                </div>

                <!-- Filters -->
                <div class="filter-tabs fade-up">

                    <button class="filter-tab" data-filter="python"><i class="fab fa-python"></i> Data Science</button>
                    <button class="filter-tab" data-filter="web"><i class="fas fa-code"></i> Full-Stack Web</button>
                </div>

                <!-- Search -->
                <div class="search-container fade-up">
                    <i class="fas fa-search search-icon"></i>

                <!-- Sequential Grid -->
                <div class="projects-sequential" id="projectsGrid">

            </div>

        <!-- Dynamic Footer Container -->
        <div id="footer-placeholder"></div>
    </div>

    <!-- Script -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Fetch footer from index.html
            fetch('index.html')
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const footer = doc.querySelector('footer');
                    if (footer) {
                        document.getElementById('footer-placeholder').appendChild(footer);
                        // Re-init QR Code for footer
                        setTimeout(() => {
                            const qrContainer = document.getElementById('qrCodeContainer');
                            if (qrContainer && typeof QRCode !== 'undefined') {
                                qrContainer.innerHTML = '';
                                const vcard = 'BEGIN:VCARD\\nVERSION:3.0\\nFN:Vikash Saravanan\\nEMAIL:vikash07052008@gmail.com\\nTEL:+919342877474\\nURL:https://vikashsaravanann.github.io/Portfolio_Information/\\nEND:VCARD';
                                new QRCode(qrContainer, {
                                    text: vcard,
                                    width: 180,
                                    height: 180,
                                    colorDark: "#0a0a0f",
                                    colorLight: "#ffffff",
                                    correctLevel: QRCode.CorrectLevel.M
                                });
                            }
                        }, 500);
                    }
                });

            // Repositories Data (Sorted by impact)
            const repos = [
                {
                    name: "HearWise Child Health",
                    desc: "A mobile-first school hearing screening platform built to eliminate undetected childhood hearing loss in India. Empowers non-specialists to run clinically valid screenings in under 10 minutes — no specialist hardware required. Features offline-first architecture (async data queue), four-frequency audiometric sweep (500–4000 Hz), and WHO/AAA-compliant pre-test readiness gates.",
                    tech: ["React", "TypeScript", "Vite", "Supabase", "Vercel"],
                    url: "https://github.com/vikashsaravanann/hearwise-child-health",
                    liveUrl: "https://hearwise-child-health.vercel.app",
                    category: "web",
                    icon: "fa-ear-listen"
                },
                {
                    name: "OpenEnv-Debugger",
                    desc: "A production-ready simulation environment for training AI agents on customer support ticket triage. Built for the Meta PyTorch OpenEnv Hackathon × Scaler School of Technology (Finalist). Agents practice classifying, prioritizing, and routing tickets via stateful API endpoints.",
                    tech: ["Python", "FastAPI", "Docker", "Pydantic", "Hugging Face"],
                    url: "https://github.com/vikashsaravanann/OpenEnv-Debugger",
                    liveUrl: "https://huggingface.co/spaces/vikashsaravanan/openenv-support-triage",
                    category: "ai",
                    icon: "fa-robot"
                },
                {
                    name: "TrafficVision AI (Yudhisthra)",
                    desc: "An intelligent traffic management system that replaces fixed-timer lights with real-time vision-based adaptive control. Detects vehicle density and emergency vehicles using YOLOv8, controls physical Arduino LED traffic lights, and visualizes data on a live React dashboard.",
                    tech: ["Python", "YOLOv8", "React", "Flask", "Arduino (C++)"],
                    url: "https://github.com/vikashsaravanann/AI-Traffic-Management-system",
                    category: "ai",
                    icon: "fa-traffic-light"
                },
                {
                    name: "Dropout Alert System",
                    desc: "An edge AI-powered system to predict girl student dropout risk in rural Indian schools. Runs fully offline on Android using TFLite/ONNX. Features Explainable AI (SHAP values) for teachers and geospatial clustering to optimize CSR school bus logistics.",
                    tech: ["Python", "XGBoost", "Edge AI", "FastAPI", "Flutter"],
                    url: "https://github.com/vikashsaravanann/dropout-alert-system",
                    category: "ai",
                    icon: "fa-user-graduate"
                },
                {
                    name: "Portfolio_Information",
                    desc: "My personal portfolio website (you are here!) featuring a dark-tech aesthetic, an integrated AI assistant powered by Grok AI, automated PDF resume generation, and a fully functional dynamic repository catalog.",
                    tech: ["HTML5", "CSS3", "JavaScript", "GitHub Pages"],
                    url: "https://github.com/vikashsaravanann/Portfolio_Information",
                    liveUrl: "https://vikashsaravanann.github.io/Portfolio_Information/",
                    category: "web",
                    icon: "fa-id-badge"
                },
                {
                    name: "IPL Data Analysis Project",
                    desc: "A comprehensive Exploratory Data Analysis (EDA) of IPL cricket data from 2008–2020. Uncovered insights into team dominance, player performance (e.g., AB de Villiers' record awards), and the statistical impact of winning the toss.",
                    tech: ["Python", "Pandas", "Matplotlib", "Seaborn", "Jupyter"],
                    url: "https://github.com/vikashsaravanann/IPL-Data-Analysis-Project",
                    category: "python",
                    icon: "fa-chart-pie"
                },
                {
                    name: "GameHub",
                    desc: "A modular, console-based Python game arcade featuring multiple classic mini-games (Tic-Tac-Toe with Minimax AI, Snake, Rock-Paper-Scissors). Includes multi-user profiles, persistent scoreboards, and dynamic difficulty via a beautiful Rich-powered terminal UI.",
                    tech: ["Python 3", "OOP", "Rich CLI", "JSON"],
                    url: "https://github.com/vikashsaravanann/gamehub",
                    category: "python",
                    icon: "fa-gamepad"
                },
                {
                    name: "FCC Mean-Variance Calculator",
                    desc: "freeCodeCamp Certification Project: A Python function utilizing NumPy to mathematically calculate the mean, variance, standard deviation, max, min, and sum across the axes of a 3x3 matrix.",
                    tech: ["Python", "NumPy", "Statistics"],
                    url: "https://github.com/vikashsaravanann/fcc-mean-variance-calculator",
                    category: "python",
                    icon: "fa-calculator"
                },
                {
                    name: "FCC Demographic Data Analyzer",
                    desc: "freeCodeCamp Certification Project: Extensive analysis of a 1994 US census (Adult) dataset. Used Pandas to extract precise demographic insights, salary correlations, and educational breakdowns.",
                    tech: ["Python", "Pandas", "Data Cleaning"],
                    url: "https://github.com/vikashsaravanann/fcc-demographic-data-analyzer",
                    category: "python",
                    icon: "fa-users"
                },
                {
                    name: "FCC Medical Data Visualizer",
                    desc: "freeCodeCamp Certification Project: Complex categorical visualization of a large-scale medical examination dataset. Normalized health metrics to plot Seaborn heatmaps and categorical split graphs.",
                    tech: ["Python", "Pandas", "Seaborn", "Matplotlib"],
                    url: "https://github.com/vikashsaravanann/fcc-medical-data-visualizer",
                    category: "python",
                    icon: "fa-heartbeat"
                },
                {
                    name: "FCC Page View Time Series",
                    desc: "freeCodeCamp Certification Project: Time series data visualization of freeCodeCamp forum page views (2016-2019). Cleaned anomalous data to generate insightful line, bar, and box plots identifying yearly growth trends.",
                    tech: ["Python", "Pandas", "Matplotlib", "Seaborn"],
                    url: "https://github.com/vikashsaravanann/fcc-page-view-time-series-visualizer",
                    category: "python",
                    icon: "fa-chart-line"
                },
                {
                    name: "FCC Sea Level Predictor",
                    desc: "freeCodeCamp Certification Project: Scientific predictive modeling using global historical sea level data. Applied SciPy's linear regression to predict future sea level rise up to the year 2050.",
                    tech: ["Python", "Pandas", "SciPy", "Matplotlib"],
                    url: "https://github.com/vikashsaravanann/fcc-sea-level-predictor",
                    category: "python",
                    icon: "fa-water"
                },
                {
                    name: "Logic-Intelligence",
                    desc: "Early exploratory repository dealing with desktop technologies. Contains early learning structures and experimental frontend deployments for agency business workflows.",
                    tech: ["HTML5", "CSS"],
                    url: "https://github.com/vikashsaravanann/Logic-Intelligence",
                    category: "web",
                    icon: "fa-building"
                },
                {
                    name: "BroadcastAI-Portfolio",
                    desc: "Private personal branding repository associated with the @startupwithvikash initiative. Contains specialized portfolio configurations for an AI broadcasting concept.",
                    tech: ["HTML5", "Configurations"],
                    url: "https://github.com/vikashsaravanann/BroadcastAI-Portfolio",
                    category: "web",
                    icon: "fa-broadcast-tower"
                },
                {
                    name: "Web-Development",
                    desc: "An early foundational repository demonstrating responsive single-page HTML structures and the building blocks of modern CSS web layouts.",
                    tech: ["HTML", "CSS"],
                    url: "https://github.com/vikashsaravanann/Web-Development",
                    category: "web",
                    icon: "fa-file-code"
                },
                {
                    name: "portfolio.vikashsaravanan",
                    desc: "Archived asset repository managing specific profile data, legacy configurations, and early web development experiments prior to the main portfolio launch.",
                    tech: ["Config", "Assets"],
                    url: "https://github.com/vikashsaravanann/portfolio.vikashsaravanan",
                    category: "web",
                    icon: "fa-archive"
                }
            ];

            const grid = document.getElementById('projectsGrid');
            const searchInput = document.getElementById('repoSearch');
            const filterTabs = document.querySelectorAll('.filter-tab');

            function renderRepos(data) {
                if (data.length === 0) {
                    grid.innerHTML = `
                        <div style="text-align: center; padding: 50px; color: rgba(255,255,255,0.5);">
                            <i class="fas fa-ghost" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.5;"></i>
                            <h3>No repositories found matching your criteria.</h3>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = data.map((repo, i) => `
                    <div class="deep-dive-card stagger-in" data-category="${repo.category}" style="animation-delay: ${(i * 0.05) % 1}s; margin-top: 20px; margin-bottom: 20px;">
                        <div class="deep-dive-header">
                            <h3><i class="fas ${repo.icon} text-accent"></i> ${repo.name}</h3>
                            <div class="tags">
                                ${repo.tech.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                        <div class="deep-dive-body">
                            <div class="problem-solution">
                                <h4><span class="text-accent">Overview:</span> ${repo.desc}</h4>
                            </div>
                            <div class="tech-highlights mt-4">
                                <h4>Repository Access</h4>
                                <ul class="highlight-list">
                                    <li><strong>GitHub Source:</strong> <a href="${repo.url}" target="_blank" style="color: #0ea5e9; text-decoration: none; font-weight: 600;"><i class="fab fa-github"></i> View Repository</a></li>
                                    ${repo.liveUrl ? `<li><strong>Live Deployment:</strong> <a href="${repo.liveUrl}" target="_blank" style="color: #10b981; text-decoration: none; font-weight: 600;"><i class="fas fa-external-link-alt"></i> View Live Site / API</a></li>` : ''}
                                </ul>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Initial render
            renderRepos(repos);

            // Filtering
            filterTabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    filterTabs.forEach(t => t.classList.remove('active'));
                    e.target.closest('button').classList.add('active');
                    const filter = e.target.closest('button').getAttribute('data-filter');
                    
                    if (filter === 'all') {
                        renderRepos(repos);
                    } else {
                        renderRepos(repos.filter(r => r.category === filter));
                    }
                });
            });

            // Searching
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = repos.filter(r => 
                    r.name.toLowerCase().includes(term) || 
                    r.desc.toLowerCase().includes(term) ||
                    r.tech.some(t => t.toLowerCase().includes(term))
                );
                renderRepos(filtered);
            });
        });
    </script>
</body>
